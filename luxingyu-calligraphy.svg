<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 380" role="img" aria-labelledby="title desc">
  <title id="title">陆氏干饭王</title>
  <desc id="desc">A looping left-to-right soft-brush calligraphy animation for Lu Shi Gan Fan Wang.</desc>
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="0.5" stop-color="#161616" />
      <stop offset="1" stop-color="#000" />
    </linearGradient>
    <pattern id="ricePaper" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="#fffdf7" />
      <path d="M0 8 H34 M0 25 H34 M9 0 V34 M26 0 V34" stroke="#efe7d2" stroke-width="0.7" opacity="0.45" />
      <path d="M4 15 C12 11, 18 20, 31 14" fill="none" stroke="#e6dcc2" stroke-width="0.55" opacity="0.35" />
    </pattern>
    <symbol id="bambooLeaf" viewBox="0 0 120 34">
      <path d="M2 17 C32 -4, 82 -2, 118 17 C82 36, 32 38, 2 17 Z" fill="#3f7d46" opacity="0.42" />
      <path d="M12 17 C42 13, 76 14, 110 17" fill="none" stroke="#2f6b3b" stroke-width="2" stroke-linecap="round" opacity="0.34" />
    </symbol>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="8" result="noise" />
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.96 0 0 0 0 0.93 0 0 0 0 0.84 0 0 0 0.18 0" />
    </filter>
    <filter id="roughInk" x="-15%" y="-30%" width="130%" height="170%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="3" seed="18" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="inkBloom" x="-15%" y="-30%" width="130%" height="170%">
      <feGaussianBlur stdDeviation="0.45" result="blur" />
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" seed="31" result="grain" />
      <feDisplacementMap in="blur" in2="grain" scale="3" />
      <feComposite in2="SourceGraphic" operator="over" />
    </filter>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18" />
    </filter>
    <style>
      .char {
        font-family: STXingkai, Xingkai SC, KaiTi, STKaiti, Kaiti SC, serif;
        font-size: 154px;
        font-weight: 900;
      }
      .write {
        fill: none;
        stroke: #030303;
        stroke-width: 5.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 520;
        stroke-dashoffset: 520;
      }
      .fill {
        fill: url(#ink);
        opacity: 0;
      }
    </style>
  </defs>

  <rect width="1320" height="380" fill="url(#ricePaper)" />
  <rect width="1320" height="380" filter="url(#paperNoise)" opacity="0.34" />
  <g opacity="0.72">
    <g transform="translate(-260 0)">
      <animateTransform attributeName="transform" type="translate" values="-260 0;1320 -28" dur="22s" repeatCount="indefinite" />
      <use href="#bambooLeaf" x="42" y="62" width="92" height="26" transform="rotate(-14 88 75)" />
      <use href="#bambooLeaf" x="250" y="30" width="126" height="36" transform="rotate(11 313 48)" />
      <use href="#bambooLeaf" x="510" y="300" width="104" height="30" transform="rotate(-18 562 315)" />
      <use href="#bambooLeaf" x="790" y="74" width="86" height="24" transform="rotate(17 833 86)" />
      <use href="#bambooLeaf" x="1050" y="260" width="118" height="34" transform="rotate(-9 1109 277)" />
    </g>
    <g transform="translate(-520 0)" opacity="0.58">
      <animateTransform attributeName="transform" type="translate" values="-520 0;1320 36" dur="31s" repeatCount="indefinite" />
      <use href="#bambooLeaf" x="120" y="262" width="84" height="24" transform="rotate(22 162 274)" />
      <use href="#bambooLeaf" x="430" y="118" width="116" height="34" transform="rotate(-13 488 135)" />
      <use href="#bambooLeaf" x="720" y="42" width="96" height="28" transform="rotate(9 768 56)" />
      <use href="#bambooLeaf" x="980" y="314" width="108" height="31" transform="rotate(15 1034 329)" />
      <use href="#bambooLeaf" x="1230" y="128" width="90" height="26" transform="rotate(-20 1275 141)" />
    </g>
  </g>
  <path d="M112 292 C284 238, 468 220, 660 235 C858 251, 1012 282, 1200 202" fill="none" stroke="#111" stroke-width="18" stroke-linecap="round" opacity="0.055" />
  <path d="M112 98 C308 44, 512 50, 714 84 C872 111, 1022 82, 1194 45" fill="none" stroke="#111" stroke-width="10" stroke-linecap="round" opacity="0.05" />

  <g filter="url(#softShadow)" transform="skewX(-5)">
    <g transform="translate(180 232)">
      <text class="char write" text-anchor="middle" filter="url(#roughInk)">陆
        <animate attributeName="stroke-dashoffset" values="520;0;0;520" keyTimes="0;0.16;0.84;1" dur="9s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.03;0.9;1" dur="9s" repeatCount="indefinite" />
      </text>
      <text class="char fill" text-anchor="middle" filter="url(#inkBloom)">陆
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.14;0.2;0.9;1" dur="9s" repeatCount="indefinite" />
      </text>
    </g>

    <g transform="translate(420 232)">
      <text class="char write" text-anchor="middle" filter="url(#roughInk)">氏
        <animate attributeName="stroke-dashoffset" values="520;520;0;0;520" keyTimes="0;0.17;0.32;0.84;1" dur="9s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.16;0.2;0.9;1" dur="9s" repeatCount="indefinite" />
      </text>
      <text class="char fill" text-anchor="middle" filter="url(#inkBloom)">氏
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.36;0.9;1" dur="9s" repeatCount="indefinite" />
      </text>
    </g>

    <g transform="translate(650 232)">
      <text class="char write" text-anchor="middle" filter="url(#roughInk)">干
        <animate attributeName="stroke-dashoffset" values="520;520;0;0;520" keyTimes="0;0.33;0.48;0.84;1" dur="9s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.32;0.36;0.9;1" dur="9s" repeatCount="indefinite" />
      </text>
      <text class="char fill" text-anchor="middle" filter="url(#inkBloom)">干
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.46;0.52;0.9;1" dur="9s" repeatCount="indefinite" />
      </text>
    </g>

    <g transform="translate(890 232)">
      <text class="char write" text-anchor="middle" filter="url(#roughInk)">饭
        <animate attributeName="stroke-dashoffset" values="520;520;0;0;520" keyTimes="0;0.49;0.64;0.84;1" dur="9s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.48;0.52;0.9;1" dur="9s" repeatCount="indefinite" />
      </text>
      <text class="char fill" text-anchor="middle" filter="url(#inkBloom)">饭
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.62;0.68;0.9;1" dur="9s" repeatCount="indefinite" />
      </text>
    </g>

    <g transform="translate(1130 232)">
      <text class="char write" text-anchor="middle" filter="url(#roughInk)">王
        <animate attributeName="stroke-dashoffset" values="520;520;0;0;520" keyTimes="0;0.65;0.8;0.84;1" dur="9s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.64;0.68;0.9;1" dur="9s" repeatCount="indefinite" />
      </text>
      <text class="char fill" text-anchor="middle" filter="url(#inkBloom)">王
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.78;0.84;0.9;1" dur="9s" repeatCount="indefinite" />
      </text>
    </g>
  </g>

  <path d="M118 300 C360 336, 720 338, 1214 256" fill="none" stroke="#000" stroke-width="7" stroke-linecap="round" opacity="0">
    <animate attributeName="stroke-dasharray" values="0 1180;1180 0;1180 0;0 1180" keyTimes="0;0.76;0.88;1" dur="9s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;0;0.58;0.58;0" keyTimes="0;0.64;0.78;0.9;1" dur="9s" repeatCount="indefinite" />
  </path>

</svg>
